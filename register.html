<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Register</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Roboto', sans-serif;}
body, html {height:100%;}

/* Video background */
#bgVideo {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:-1;
}

/* Container */
.register-container {
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Card */
.register-card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding:40px 30px;
  border-radius:15px;
  width:400px;
  text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}
.register-card h2 {margin-bottom:25px; color:white;}

/* Input group */
.input-group {position:relative; margin-bottom:20px; text-align:left;}
.input-group label {display:block; margin-bottom:5px; font-weight:500; color:white;}
.input-group input {
  width:100%;
  padding:12px 40px 12px 12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  background: rgba(255,255,255,0.2);
  color:white;
}
.input-group input:focus {outline:none; background: rgba(255,255,255,0.3);}

/* Toggle password */
.toggle-password {
  position:absolute; right:10px; top:38px; cursor:pointer; font-size:18px; color:white;
}

/* Button */
button {width:100%; padding:12px; border:none; border-radius:8px; background:#43cea2; color:white; font-size:16px; font-weight:500; cursor:pointer; transition:0.3s;}
button:hover {background:#2bb673;}

/* Error message */
.error-msg {color:#ff7675; font-size:14px; margin-top:10px; min-height:18px;}

/* Footer */
.register-footer {margin-top:20px;}
.register-footer a {color:white; text-decoration:underline;}
</style>
</head>
<body>

<video autoplay muted loop id="bgVideo">
  <source src="/eo.mp4" type="video/mp4">
</video>

<div class="register-container">
  <div class="register-card">
    <h2>Register</h2>
    <form id="registerForm">
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
        <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
      </div>
      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
      </div>
      <button type="submit">Sign Up</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
    <div class="register-footer">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>
</div>

<script>
// Dummy users array
let users = [];

const registerForm = document.getElementById('registerForm');
const errorMsg = document.getElementById('errorMsg');

registerForm.addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if(password !== confirmPassword){ errorMsg.textContent="Passwords do not match!"; return; }
  if(users.find(u=>u.email===email)){ errorMsg.textContent="Email already registered!"; return; }

  users.push({name,email,password});
  errorMsg.textContent="";
  alert("Registration successful! 🎉");
  registerForm.reset();
});

function togglePassword(fieldId){
  const input = document.getElementById(fieldId);
  input.type = input.type==="password"?"text":"password";
}
</script>
</body>
</html>
